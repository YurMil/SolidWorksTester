name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore SolidWorksTester.sln

      - name: Build Release
        run: dotnet build SolidWorksTester.sln -c Release --no-restore

      - name: Test
        run: dotnet test SolidWorksTester.sln -c Release --no-build --verbosity normal
